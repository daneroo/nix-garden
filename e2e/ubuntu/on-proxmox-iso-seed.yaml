#cloud-config
# Template: VM_USER, PASSWORD_HASH, SSH_PUBKEY are expanded by
# provision.sh via envsubst from on-proxmox-common.sh values.
autoinstall:
  version: 1
  locale: en_CA.UTF-8
  timezone: America/New_York
  keyboard:
    layout: us
  network:
    network:
      version: 2
      ethernets:
        ens18:
          dhcp4: true
  storage:
    layout:
      name: direct
  identity:
    hostname: ubuntu-rdp
    username: ${VM_USER}
    # Generated with: mkpasswd -m sha-512
    password: "${PASSWORD_HASH}"
  ssh:
    install-server: true
    authorized-keys:
      - "${SSH_PUBKEY}"
    allow-pw: true
  shutdown: poweroff
  late-commands:
    - curtin in-target -- apt-get update
    - curtin in-target -- apt-get install -y qemu-guest-agent
    - curtin in-target -- systemctl enable qemu-guest-agent
    - echo '${VM_USER} ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/${VM_USER}
